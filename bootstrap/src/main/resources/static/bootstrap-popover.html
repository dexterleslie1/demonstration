<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>popover</title>

    <!-- 新 Bootstrap 核心 CSS 文件 -->
    <link href="https://cdn.bootcss.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery文件。务必在bootstrap.min.js 之前引入 -->
    <script src="https://cdn.bootcss.com/jquery/2.1.1/jquery.min.js"></script>
    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="https://cdn.bootcss.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script type="text/javascript">
        $(document).ready(function () {

        })
    </script>
    <style type="text/css">
        /**
        https://iowiki.com/bootstrap/bootstrap_popover_plugin.html
         */
        .my-popover.popover{
            top:0 !important;
            right:0 !important;
            left: auto !important;
            max-width: 70% !important;
            width: 70% !important;
            height: 100% !important;
        }

        .my-popover.popover.right {
            margin-left: 0 !important;
        }

        .my-popover.popover .arrow{
            display:none;
        }
    </style>
</head>
<body>
<div class="container" style="margin-top:20px;">
    <div class = "container" style = "padding: 100px 50px 10px;" >
        <button type = "button" class = "btn btn-default popover-show"
                title = "Popover title" data-container = "body"
                data-toggle = "popover" data-placement = "left"
                data-content = "Some content in Popover with show method">
            Popover on left
        </button>
        <button type = "button" class = "btn btn-primary popover-hide"
                title = "Popover title" data-container = "body"
                data-toggle = "popover" data-placement = "top"
                data-content = "Some content in Popover-hide method">
            Popover on top
        </button>
        <button type = "button" class = "btn btn-success popover-destroy"
                title = "Popover title" data-container = "body"
                data-toggle = "popover" data-placement = "bottom"
                data-content = "Some content in Popover-destroy method">
            Popover on bottom
        </button>
        <button type = "button" class = "btn btn-warning popover-toggle"
                title = "Popover title" data-container = "body"
                data-toggle = "popover" data-placement = "top"
                data-content = "Some content in Popover-toggle method">
            Popover on right
        </button>
        <br><br><br><br><br><br>
        <p class = "popover-options">
            <a href = "#" type = "button" class = "btn btn-warning"
               title = "<h2>Title</h2>" data-container = "body"
               data-toggle = "popover" data-content = "
         <h4>Some content in Popover-options method</h4>">
                Popover
            </a>
        </p>
        <script>
            $(function () { $('.popover-show').popover('show');});
            $(function () { $('.popover-hide').popover('hide');});
            $(function () { $('.popover-destroy').popover('destroy');});
            $(function () { $('.popover-toggle').popover('toggle');});
            $(function () {
                // popover添加自定义class
                // https://stackoverflow.com/questions/12170357/dynamically-add-a-class-to-bootstraps-popover-container
                $(".popover-options a").popover({html : true})
                    .data('bs.popover').tip().addClass('my-popover');
            });
        </script>
    </div>
</div>
</body>
</html>
