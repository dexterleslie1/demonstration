apiVersion: v1
kind: Service
metadata:
 name: redis-cluster-service
spec:
 type: ClusterIP
 sessionAffinity: None
 selector:
  app.kubernetes.io/name: redis-cluster
 ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
 name: redis-cluster-headless
spec:
 type: ClusterIP
 clusterIP: None
 selector:
  app.kubernetes.io/name: redis-cluster
 ports:
  - port: 6379
    targetPort: 6379
