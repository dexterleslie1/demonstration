apiVersion: v1
kind: Pod
metadata:
  name: demo-redistemplate-cluster
  labels:
    app: demo-redistemplate-cluster
spec:
  containers:
    - name: demo-redistemplate-cluster
      image: docker.118899.net:10001/yyd-public/demo-redistemplate-cluster

---
apiVersion: v1
kind: Service
metadata:
  name: demo-redistemplate-cluster
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000
  selector:
    app: demo-redistemplate-cluster
