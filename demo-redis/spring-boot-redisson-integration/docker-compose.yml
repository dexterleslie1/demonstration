version: "3.0"

# 创建网络
networks:
  net:
    name: spring-boot-redisson-integration-net

services:
  spring-boot-redisson-integration-redis-server:
    container_name: spring-boot-redisson-integration-redis-server
    image: redis:5.0.14
    # 设置redis密码
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass 123456
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    environment:
      - TZ=Asia/Shanghai
    ports:
      - 6379:6379
    networks:
      - net