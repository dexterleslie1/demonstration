version: "3.0"

services:
  openresty:
    build:
      context: ./
    image: 192.168.235.138:80/library/demo-openresty-base-dev
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./sample.conf:/usr/local/openresty/nginx/conf/nginx.conf
      - ./sample.rules:/usr/local/openresty/nginx/conf/naxsi.rules
    network_mode: host
    