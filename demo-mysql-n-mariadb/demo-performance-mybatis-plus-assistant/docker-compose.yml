version: "3.0"

services:
  # 启动mariadb
  db:
    build:
      context: ./
    image: demo-performance-mybatis-plus-db-dev
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - TZ=Asia/Shanghai
    volumes:
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-character-set-client-handshake
    network_mode: host