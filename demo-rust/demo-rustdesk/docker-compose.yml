services:
  hbbs:
    container_name: hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs
    # volumes:
    #   - ./data:/root
    network_mode: "host"
    # environment:
    #   - ALWAYS_USE_RELAY=Y
    depends_on:
      - hbbr
    restart: unless-stopped

  hbbr:
    container_name: hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    # volumes:
    #   - ./data:/root
    network_mode: "host"
    restart: unless-stopped
