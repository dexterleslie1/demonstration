version: "3.0"

# 创建网络
networks:
  net:
    name: demo-elasticsearch

services:
  demo-elasticsearch:
    container_name: demo-elasticsearch
    image: docker.118899.net:10001/yyd-public/demo-elasticsearch
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
      # http.cors表示允许elasticsearch-head连接并管理
      - http.cors.enabled=true
      - http.cors.allow-origin=*
      - TZ=Asia/Shanghai
    ports:
      - 9200:9200
      # Java transport client需要连接这个端口去操作elasticsearch
      - 9300:9300
    volumes:
     - ~/data-demo-elasticsearch7:/usr/share/elasticsearch/data
    networks:
      - net

  demo-kibana:
    container_name: demo-kibana
    image: kibana:7.8.0
    environment:
      - ELASTICSEARCH_HOSTS=http://demo-elasticsearch:9200
    ports:
      - 5601:5601
    networks:
      - net
    depends_on:
      - demo-elasticsearch

  demo-elasticsearch-ik-ext:
    container_name: demo-elasticsearch-ik-ext
    image: openresty/openresty
    volumes:
     - ./ik_dict.txt:/usr/local/openresty/nginx/html/ik_dict.txt
     - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
    #ports:
    # - 80:80
    networks:
     - net

