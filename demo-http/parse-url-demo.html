<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>浏览器 JavaScript API 拆解 URL 示例</title>
  <style>
    body { font-family: monospace; padding: 1rem; max-width: 900px; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.6rem; text-align: left; }
    th { background: #f0f0f0; width: 140px; }
    .value { word-break: break-all; }
    h1 { font-size: 1.1rem; }
    h2 { margin-top: 1.5rem; font-size: 1rem; }
    code { background: #f5f5f5; padding: 0.1em 0.3em; }
  </style>
</head>
<body>
  <h1>使用 URL / URLSearchParams 拆解 URL</h1>
  <p>示例 URL：<code id="sample-url"></code></p>

  <h2>1. URL 对象属性（new URL(urlString)）</h2>
  <table>
    <tr><th>属性</th><th>值</th></tr>
    <tr><td>href</td><td class="value" id="href"></td></tr>
    <tr><td>protocol</td><td class="value" id="protocol"></td></tr>
    <tr><td>hostname</td><td class="value" id="hostname"></td></tr>
    <tr><td>port</td><td class="value" id="port"></td></tr>
    <tr><td>host</td><td class="value" id="host"></td></tr>
    <tr><td>origin</td><td class="value" id="origin"></td></tr>
    <tr><td>pathname</td><td class="value" id="pathname"></td></tr>
    <tr><td>search</td><td class="value" id="search"></td></tr>
    <tr><td>hash</td><td class="value" id="hash"></td></tr>
  </table>

  <h2>2. URLSearchParams 解析查询参数（url.searchParams）</h2>
  <table>
    <tr><th>参数名</th><th>参数值</th><th>获取方式</th></tr>
    <tbody id="params-body"></tbody>
  </table>

  <script>
    var sampleUrl = 'http://192.168.1.146:8085/api/v1/archive/postClient?orgId=395&userId=5154&client=web';

    document.getElementById('sample-url').textContent = sampleUrl;

    // 使用 URL API 拆解
    var url = new URL(sampleUrl);

    document.getElementById('href').textContent = url.href;
    document.getElementById('protocol').textContent = url.protocol;
    document.getElementById('hostname').textContent = url.hostname;
    document.getElementById('port').textContent = url.port || '(空)';
    document.getElementById('host').textContent = url.host;
    document.getElementById('origin').textContent = url.origin;
    document.getElementById('pathname').textContent = url.pathname;
    document.getElementById('search').textContent = url.search || '(空)';
    document.getElementById('hash').textContent = url.hash || '(空)';

    // 使用 URLSearchParams 遍历查询参数
    var tbody = document.getElementById('params-body');
    url.searchParams.forEach(function (value, key) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + key + '</td>' +
        '<td class="value">' + value + '</td>' +
        '<td><code>url.searchParams.get("' + key + '")</code> → "' + url.searchParams.get(key) + '"</td>';
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
