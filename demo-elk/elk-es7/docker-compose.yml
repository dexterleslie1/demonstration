version: "3.0"

services:
  demo-elk-elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile-elasticsearch
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-elk-elasticsearch
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
      # http.cors表示允许elasticsearch-head连接并管理
      - http.cors.enabled=true
      - http.cors.allow-origin=*
      - TZ=Asia/Shanghai
    ports:
      - 9200:9200
      # Java transport client需要连接这个端口去操作elasticsearch
      - 9300:9300
    #volumes:
    #  - ~/data-demo-elk-elasticsearch:/usr/share/elasticsearch/data

  demo-elk-kibana:
    image: kibana:7.8.0
    environment:
      ELASTICSEARCH_HOSTS: http://demo-elk-elasticsearch:9200
    ports:
      - 5601:5601
    depends_on:
      - demo-elk-elasticsearch

  demo-elk-logstash:
    build:
      context: .
      dockerfile: Dockerfile-logstash
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-elk-logstash
    environment:
      - xpack.monitoring.elasticsearch.hosts=[ "http://demo-elk-elasticsearch:9200" ]
      - LS_JAVA_OPTS=-Xmx256m -Xms256m
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - 5044:5044

  # ILM 初始化：ES 启动后执行一次，注册策略与索引模板（30 天后自动删除过期索引）
  demo-elk-ilm-init:
    image: curlimages/curl:8.5.0
    volumes:
      - ./ilm:/ilm:ro
    environment:
      - ES_URL=http://demo-elk-elasticsearch:9200
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "sh /ilm/init-ilm.sh"
    depends_on:
      - demo-elk-elasticsearch
    restart: "no"

