version: '3.3'

services:
  prometheus:
    image: prom/prometheus:v2.37.6
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert-rule.yml:/etc/prometheus/alert-rule.yml
      - data-demo-prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      #热加载配置
      - '--web.enable-lifecycle'
      #api配置
      #- '--web.enable-admin-api'
      #历史数据最大保留时间，默认15天
      - '--storage.tsdb.retention.time=30d'  
    ports:
      - '9090:9090'
    # depends_on:
    #   - cadvisor


  alertmanager:
    image: prom/alertmanager:v0.25.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./alertmanager.yml:/etc/alertmanager/config.yml
      - ./customize-email.tmpl:/usr/local/alertmanager/template/customize-email.tmpl
      - data-demo-prometheus-alertmanager:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '9093:9093'
    depends_on:
      - prometheus-webhook-dingtalk

  # 钉钉告警中转：接收 Alertmanager webhook 并转发到钉钉机器人
  prometheus-webhook-dingtalk:
    image: timonwong/prometheus-webhook-dingtalk:v2.1.0
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./dingtalk-webhook.yml:/etc/prometheus-webhook-dingtalk/config.yml:ro
    command:
      - '--config.file=/etc/prometheus-webhook-dingtalk/config.yml'
      - '--web.listen-address=:8060'
    ports:
      - '8060:8060'

  # cadvisor:
  #   image: google/cadvisor:latest
  #   restart: always
  #   volumes:
  #     - /etc/localtime:/etc/localtime:ro
  #     - /:/rootfs:ro
  #     - /var/run:/var/run:rw
  #     - /sys:/sys:ro
  #     - /var/lib/docker/:/var/lib/docker:ro
  #   ports:
  #     - '8080:8080'

  node_exporter:
    image: prom/node-exporter:v1.5.0
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - '9100:9100'

  grafana:
    image: grafana/grafana:9.4.3
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./grafana-provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/default.yaml:ro
      - ./grafana-provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/default.yaml:ro
      - ./grafana-provisioning/1860.json:/var/lib/grafana/dashboards/1860.json:ro
      - ./grafana-provisioning/4202.json:/var/lib/grafana/dashboards/4202.json:ro
      - data-demo-prometheus-grafana:/var/lib/grafana
    env_file:
      - ./grafana-config.monitoring
    ports:
      - '3000:3000'
    depends_on:
      - prometheus

  nacos-server:
    image: nacos/nacos-server:v2.2.0
    environment:
      - TZ=Asia/Shanghai
      - MODE=standalone
      # 启用Actuator Prometheus
      - management.endpoints.web.exposure.include=*
      - management.metrics.export.prometheus.enabled=true
      - management.endpoint.health.show-details=always
      - management.health.ping.enabled=false
    ports:
      - '8848:8848'

  seata-server:
    image: seataio/seata-server:2.0.0
    ports:
      - "7091:7091"
      - "9080:9080"
    environment:
      - JVM_XMX=512m
      - JVM_XMS=512m
      # 设置-XX:MaxDirectMemorySize=128m
      - JVM_MaxDirectMemorySize=128m
      - TZ=Asia/Shanghai
    volumes:
      - ./application-seata.yml:/seata-server/resources/application.yml
    depends_on:
      - db-seata
      - nacos-server
  db-seata:
    image: mysql:8.0.18
    user: mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-character-set-client-handshake
    volumes:
      - ./db-seata.sql:/docker-entrypoint-initdb.d/db.sql
    environment:
      - LANG=C.UTF-8
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=123456
    ports:
      - '3306:3306'

volumes:
  data-demo-prometheus:
  data-demo-prometheus-grafana:
  data-demo-prometheus-alertmanager:
