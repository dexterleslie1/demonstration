version: '3.8'

services:
  db:
    image: mariadb:10.4.19
    # ports:
    #   - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=123456
      - TZ=Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-character-set-client-handshake
    deploy:
      # https://docs.docker.com/reference/compose-file/deploy/#replicas
      replicas: 1
      # https://docs.docker.com/reference/compose-file/deploy/#restart_policy
      restart_policy:
        condition: on-failure
        delay: 15s
      placement:
        constraints:
          # 指定数据库调度到mylabel==db节点上
          - node.labels.mylabel==db

  node1:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-redis:1.0.0
    command: redis-server /usr/local/etc/redis/redis.conf --cluster-announce-ip node1
    environment:
      - TZ=Asia/Shanghai
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s

  node2:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-redis:1.0.0
    command: redis-server /usr/local/etc/redis/redis.conf --cluster-announce-ip node2
    environment:
      - TZ=Asia/Shanghai
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s

  node3:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-redis:1.0.0
    command: redis-server /usr/local/etc/redis/redis.conf --cluster-announce-ip node3
    environment:
      - TZ=Asia/Shanghai
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s

  creator:
    image: redis:7.2.4
    entrypoint: [ /bin/sh, -c, 'sleep 10; echo "yes" | redis-cli --cluster create node1:6379 node2:6379 node3:6379' ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s
    depends_on:
      - node1
      - node2
      - node3

  eureka:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-eureka:1.0.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    ports:
      - "9999:9999"
    depends_on:
      - db
      - creator
    logging:
      driver: json-file
      options:
        max-size: "64m"
        max-file: "5"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s

  gateway:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-gateway:1.0.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      - demo-spring-cloud-assistant-eureka
    logging:
      driver: json-file
      options:
        max-size: "64m"
        max-file: "5"
    deploy:
      # 默认模式，内部采用轮询的方式把请求分配置到各个实例中
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 15s

  helloworld:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-helloworld:1.0.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    depends_on:
      - demo-spring-cloud-assistant-eureka
    logging:
      driver: json-file
      options:
        max-size: "64m"
        max-file: "5"
    deploy:
      # 默认模式，内部采用轮询的方式把请求分配置到各个实例中
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 15s

  #demo-centos:
  #  image: centos:centos7
  #  environment:
  #    - TZ=Asia/Shanghai
  #  command: sleep 3600
