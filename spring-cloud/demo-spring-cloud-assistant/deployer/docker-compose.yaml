version: '3.8'

services:
  db:
    image: mariadb:10.4.19
    # ports:
    #   - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=123456
      - TZ=Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-character-set-client-handshake
    deploy:
      # https://docs.docker.com/reference/compose-file/deploy/#replicas
      replicas: 1
      # https://docs.docker.com/reference/compose-file/deploy/#restart_policy
      restart_policy:
        condition: on-failure
        delay: 15s
      placement:
        constraints:
          # 指定数据库调度到mylabel==db节点上
          - node.labels.mylabel==db

  redis:
    image: redis:6.2.4
    command: redis-server --requirepass 123456
    environment:
      - TZ=Asia/Shanghai
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s
    # ports:
    #   - "6379:6379"

  eureka:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-eureka:1.0.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    ports:
      - "9999:9999"
    depends_on:
      - db
      - redis
    logging:
      driver: json-file
      options:
        max-size: "64m"
        max-file: "5"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s

  zuul:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-zuul:1.0.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      - demo-spring-cloud-assistant-eureka
    logging:
      driver: json-file
      options:
        max-size: "64m"
        max-file: "5"
    deploy:
      # 默认模式，内部采用轮询的方式把请求分配置到各个实例中
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 15s

  helloworld:
    image: registry.cn-hangzhou.aliyuncs.com/future-public/demo-spring-cloud-assistant-helloworld:1.0.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    depends_on:
      - demo-spring-cloud-assistant-eureka
    logging:
      driver: json-file
      options:
        max-size: "64m"
        max-file: "5"
    deploy:
      # 默认模式，内部采用轮询的方式把请求分配置到各个实例中
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 15s

  #demo-centos:
  #  image: centos:centos7
