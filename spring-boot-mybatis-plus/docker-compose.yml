version: "3.0"

# 创建网络
networks:
  net:
    name: network-internal

services:
  # 启动mariadb
  demo-mybatis-plus-db:
    container_name: demo-mybatis-plus-db
    image: docker.118899.net:10001/yyd-public/demo-mybatis-plus-db
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - TZ=Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --skip-character-set-client-handshake
    ports:
      - 50000:3306
    networks:
      - net