version: "3.0"

# 创建网络
networks:
  net:
    name: demo-rabbitmq-net

services:
  # 启动rabbitmq
  demo-rabbitmq:
    container_name: demo-rabbitmq
    #image: library/rabbitmq:3.7.16-rc.3-management
    image: docker.118899.net:10001/yyd-public/yyd-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=root
      - RABBITMQ_DEFAULT_PASS=123456
      # TODO: 时区设置不起作用
      - TZ=Asia/Shanghai
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - net
