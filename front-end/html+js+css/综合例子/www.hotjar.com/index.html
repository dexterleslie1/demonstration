    <title>Hotjar: Website Heatmaps & Behavior Analytics Tools</title>
    <style>
        :root {
            --var-background-color: #202641;
        }

        * {
            margin: 0;
            padding: 0;
        }

        body {
            /* font-family: "Ambit", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; */
            font-size: 16px;
            background-color: var(--var-background-color);
        }

        a {
            text-decoration: none;
        }

        nav {
            height: 64px;
            box-shadow: inset 0 -1px 0 #565a6f;
            padding-left: 80px;
            padding-right: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            cursor: pointer;
            /* background-color: green; */
        }

        .logo {
            display: flex;
        }

        .logo svg path {
            fill: white;
        }

        .logo path:nth-last-child(1),
        .logo path:nth-last-child(2) {
            fill: red;
        }

        .left-side-block {
            /* background-color: #fff; */
            /* width: 100%; */
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .right-side-block {
            display: flex;
            align-items: center;
        }

        ul.nav-ul {
            display: flex;
            flex-direction: row;
            list-style-type: none;
            justify-content: space-between;
            margin-left: 35px;
            color: white;
            cursor: pointer;
        }

        ul.nav-ul li {
            position: relative;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            height: 62px;
        }

        ul.nav-ul li::before {
            position: absolute;
            content: "";
            top: -1px;
            left: 0;
            width: 100%;
            height: 4px;
            /* li hover 时候显示 li::before 有过渡效果 */
            transition: all 0.3s;
        }

        ul.nav-ul li:hover::before {
            background-color: red;
        }

        ul.nav-ul li svg path {
            stroke: white;
        }

        .right-side-block>a {
            padding: 10px 5px;
            color: #c3f0f7;
            margin: auto 5px;
        }

        .right-side-block>a:hover {
            opacity: 0.8;
        }

        .right-side-block>a:nth-child(2) {
            padding: 8px 10px;
            border: 1px solid #c3f0f7;
            border-radius: 5px;
        }

        .right-side-block>a:nth-child(3) {
            color: black;
            background-color: #c3f0f7;
            border-radius: 5px;
            padding: 8px 10px;
        }

        .right-side-block .lang-switch-container>a:nth-last-of-type(1) {
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        .right-side-block .lang-switch-container {
            padding: 10px;
            border-radius: 5px;
        }

        .right-side-block .lang-switch-container:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .right-side-block .lang-switch-container>a:nth-last-of-type(1) svg:nth-child(1) path {
            /* stroke: white; */
            fill: white;
        }

        .right-side-block .lang-switch-container>a:nth-last-of-type(1) svg:nth-child(2) path {
            stroke: white;
        }

        .right-side-block .lang-switch-container {
            opacity: 0.8;
            position: relative;
        }

        ul.ul-lang-switch {
            display: none;
            position: absolute;
            top: 45px;
            left: -75px;
            border: 1px solid #8b8e9c;
            border-radius: 4px;
            list-style-type: none;
            width: max-content;
            background-color: var(--var-background-color);
        }

        ul.ul-lang-switch a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.89);
        }

        ul.ul-lang-switch li:not(:last-child) {
            border-bottom: 1px solid #8b8e9c;
        }

        ul.ul-lang-switch li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px 10px 16px;
            font-size: 14px;
            font-weight: 400;
        }

        ul.ul-lang-switch li:hover {
            background-color: #4d5167;
        }

        ul.ul-lang-switch li svg {
            transform: translateX(30px) scale(1.5);
            fill: #ff3c00;
        }
    </style>
