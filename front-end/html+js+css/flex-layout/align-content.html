<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>演示align-content用法</title>
    <style>
      /* container1 */
      .container1 {
          width: 200px;
          height: 150px;
          display: flex;
          border-style: solid;
          border-width: 1px;
          border-color: red;
          align-items: flex-start;
          align-content: flex-start;
          flex-wrap: wrap;
      }

      .container1 .box1 {
          width: 100px;
          height: 20px;
          background-color: #2c3e50;
      }

      .container1 .box2 {
          width: 100px;
          height: 30px;
          background-color: #42b983;
      }

      .container1 .box3 {
          width: 100px;
          height: 40px;
          background-color: #888888;
      }

      .container1 .box4 {
          width: 100px;
          height: 50px;
          background-color: yellowgreen;
      }

      /* container2 */
      .container2 {
          width: 200px;
          height: 150px;
          display: flex;
          border-style: solid;
          border-width: 1px;
          border-color: red;
          align-items: flex-end;
          align-content: flex-end;
          flex-wrap: wrap;
      }

      .container2 .box1 {
          width: 100px;
          height: 20px;
          background-color: #2c3e50;
      }

      .container2 .box2 {
          width: 100px;
          height: 30px;
          background-color: #42b983;
      }

      .container2 .box3 {
          width: 100px;
          height: 40px;
          background-color: #888888;
      }

      .container2 .box4 {
          width: 100px;
          height: 50px;
          background-color: yellowgreen;
      }

      /* container3 */
      .container3 {
          width: 200px;
          height: 150px;
          display: flex;
          border-style: solid;
          border-width: 1px;
          border-color: red;
          align-items: center;
          align-content: center;
          flex-wrap: wrap;
      }

      .container3 .box1 {
          width: 100px;
          height: 20px;
          background-color: #2c3e50;
      }

      .container3 .box2 {
          width: 100px;
          height: 30px;
          background-color: #42b983;
      }

      .container3 .box3 {
          width: 100px;
          height: 40px;
          background-color: #888888;
      }

      .container3 .box4 {
          width: 100px;
          height: 50px;
          background-color: yellowgreen;
      }

      /* container4 */
      .container4 {
          width: 200px;
          height: 150px;
          display: flex;
          border-style: solid;
          border-width: 1px;
          border-color: red;
          align-items: stretch;
          align-content: stretch;
          flex-wrap: wrap;
      }

      .container4 .box1 {
          width: 100px;
          /* 注意：使用align-items: stretch不能指定元素高度 */
          /*height: 20px;*/
          background-color: #2c3e50;
      }

      .container4 .box2 {
          width: 100px;
          /* 注意：使用align-items: stretch不能指定元素高度 */
          /*height: 30px;*/
          background-color: #42b983;
      }

      .container4 .box3 {
          width: 100px;
          /* 注意：使用align-items: stretch不能指定元素高度 */
          /*height: 40px;*/
          background-color: #888888;
      }

      .container4 .box4 {
          width: 100px;
          /* 注意：使用align-items: stretch不能指定元素高度 */
          /*height: 40px;*/
          background-color: yellowgreen;
      }

      /* container5 */
      .container5 {
          width: 200px;
          height: 150px;
          display: flex;
          border-style: solid;
          border-width: 1px;
          border-color: red;
          align-items: center;
          align-content: space-around;
          flex-wrap: wrap;
      }

      .container5 .box1 {
          width: 100px;
          height: 20px;
          background-color: #2c3e50;
      }

      .container5 .box2 {
          width: 100px;
          height: 30px;
          background-color: #42b983;
      }

      .container5 .box3 {
          width: 100px;
          height: 40px;
          background-color: #888888;
      }

      .container5 .box4 {
          width: 100px;
          height: 50px;
          background-color: yellowgreen;
      }

      /* container6 */
      .container6 {
          width: 200px;
          height: 150px;
          display: flex;
          border-style: solid;
          border-width: 1px;
          border-color: red;
          align-items: center;
          align-content: space-between;
          flex-wrap: wrap;
      }

      .container6 .box1 {
          width: 100px;
          height: 20px;
          background-color: #2c3e50;
      }

      .container6 .box2 {
          width: 100px;
          height: 30px;
          background-color: #42b983;
      }

      .container6 .box3 {
          width: 100px;
          height: 40px;
          background-color: #888888;
      }

      .container6 .box4 {
          width: 100px;
          height: 50px;
          background-color: yellowgreen;
      }
    </style>
</head>
<body>
<div>align-content: flex-start</div>
<div class="container1">
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
  <div class="box4"></div>
</div>
<hr>

<div>align-content: flex-end</div>
<div class="container2">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</div>
<hr>

<div>align-content: center</div>
<div class="container3">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</div>
<hr>

<div>align-content: stretch</div>
<div class="container4">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</div>
<hr>

<div>align-content: space-around</div>
<div class="container5">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</div>
<hr>

<div>align-content: space-between</div>
<div class="container6">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</div>
<hr>

</body>
</html>
