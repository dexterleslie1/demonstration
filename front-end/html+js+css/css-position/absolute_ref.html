<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            background-color: aqua;
        }

        #box > div:first-child {
            width: 200px;
            height: 200px;
            background-color: blue;
        }

        #box > div:nth-child(2) {
            width: 500px;
            height: 500px;
            background-color: blueviolet;
        }

        #father {
            width: 200px;
            height: 200px;
            background-color: burlywood;

            /* 最近的父级非static定位参考点 */
            position: relative;
            margin: 30px;
        }

        #son {
            width: 100px;
            height: 100px;
            background-color: chartreuse;

            /* 
                absolute特性：
                1、以最近的父级非static定位的元素为参考点，定位指定的偏移量
            */
            position: absolute;
            top: 100px;
            left: 100px;
        }

        #box > div:nth-child(3) {
            width: 200px;
            height: 200px;
            background-color: brown;
        }
    </style>
</head>
<body>
    <div id="box">
        <div></div>
        <div>
            <div id="father">
                <div id="son"></div>
            </div>
        </div>
        <div></div>
    </div>
</body>
</html>
