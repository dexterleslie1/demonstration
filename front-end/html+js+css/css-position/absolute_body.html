<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            background-color: aqua;
        }

        #box > div:first-child {
            width: 200px;
            height: 200px;
            background-color: blue;
        }

        #box > div:nth-child(2) {
            width: 200px;
            height: 200px;
            background-color: blueviolet;

            /* 
                absolute特性：
                1、被定位后，原有的布局流位置不占据布局空间
                2、如果所有父级元素都没有声明非static定位的则以body为参考点
            */
            position: absolute;
            top: 200px;
            left: 200px;
        }

        #box > div:nth-child(3) {
            width: 200px;
            height: 200px;
            background-color: brown;
        }
    </style>
</head>
<body>
    <div id="box">
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
