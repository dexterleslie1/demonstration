<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            background-color: aqua;
        }

        #box > div:first-child {
            width: 200px;
            height: 200px;
            background-color: blue;
        }

        #box > div:nth-child(2) {
            width: 200px;
            height: 200px;
            background-color: blueviolet;

            /* 
                relative特性：
                1、相对自己布局流位置相对定位
                2、被相对定位后，原有的布局流位置依然占据空间
            */
            position: relative;
            top: 200px;
            left: 200px;
        }

        #box > div:nth-child(3) {
            width: 200px;
            height: 200px;
            background-color: brown;
        }
    </style>
</head>
<body>
    <div id="box">
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
