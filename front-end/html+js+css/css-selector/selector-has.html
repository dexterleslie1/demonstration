<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 表示当有兄弟元素.b.active时才匹配.x元素 */
        .div1 .x:has(~ .b.active) {
            background-color: green;
        }

        .demo1>div {
            width: 200px;
            height: 100px;
            background-color: green;
            margin: 10px;
        }
        .demo1>div:has(p) {
            background-color: yellowgreen;
        }


        .demo2 .parent {
            width: 300px;
            height: 100px;
            background-color: green;
        }
        .demo2 .parent:hover:has(:not(.child:hover)) {
            background-color: blue;
        }
        .demo2 .child {
            width: 150px;
            height: 50px;
            background-color: yellowgreen;
        }
        .demo2 .child:hover {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <!--
        https://www.zhangxinxu.com/wordpress/2022/08/css-has-pseudo-class/

        NOTE：低版本的firefox、chrome浏览器不支持:has伪类
    -->

    <div>使用has选择前兄弟元素</div>
    <div class="div1">
        <ol>
            <li class="b">b</li>
            <li class="a">a</li>
            <li class="x">x</li>
            <li class="b active">b</li>
            <li class="b">b</li>
        </ol>
    </div>
    <hr>

    <!--
        https://www.freecodecamp.org/news/how-to-use-the-has-selector-in-css/
    -->
    <div>有子元素p的div background-color才变色</div>
    <div class="demo1">
        <div>你好</div>
        <div>
            <p>你好</p>
        </div>
    </div>
    <hr>

    <!--
        https://stackoverflow.com/questions/17923922/hover-on-child-should-turn-off-hover-effect-on-parent
    -->
    <div>使用has关闭父元素hover效果当hover到子元素</div>
    <div class="demo2">
        <div class="parent">
            <div class="child">

            </div>
        </div>
    </div>
    <hr>
</body>
</html>
