<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>验证</title>
    <script type="text/javascript" src="js/jquery.js"></script>
    <script type="text/javascript">
        $(document).ready(function() {
            function refresh() {
                $.post("/api/v1/captcha/get.do",function(data, status) {
                    data = JSON.parse(data)
                    $("#clientId").val(data.dataObject.clientId)
                    $("#imgVerificationCode").attr("src", data.dataObject.imageBase64)
                })
            }

            $("#imgVerificationCode").click(function() {
                refresh()
            })

            $("#btnVerify").click(function() {
                var clientId = $("#clientId").val()
                var verificationCode = $("#verificationCode").val()

                $.post("/api/v1/captcha/verify.do", {clientId: clientId, code: verificationCode}, function(data, status) {
                    data = JSON.parse(data)
                    if(data.errorCode > 0) {
                        refresh()
                        alert("验证失败")
                    } else {
                        window.location.href = data.dataObject.location
                    }
                })
            })

            refresh()
        })
    </script>
</head>
<body>
    <div style="margin-left: auto; margin-right: auto;width: 50%;text-align: center;">
        <input type="hidden" id="clientId"/>
        <img id="imgVerificationCode" src=""/>
        <br/>
        验证码：<input type="text" id="verificationCode">
        <input type="button" id="btnVerify" value="验证">
    </div>
</body>
</html>
