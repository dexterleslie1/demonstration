# https://www.linkedin.com/pulse/grafana-auto-provision-data-sources-dashboards-mohsen-abasi
# https://grafana.com/docs/grafana/latest/administration/provisioning/#example-data-source-config-file
version: "3.0"

networks:
  net:
    name: demo-grafana-net

services:
  demo-grafana:
    container_name: demo-grafana
    image: grafana/grafana:6.6.2
    environment:
      - TZ=Asia/Shanghai
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./datasources.yaml:/etc/grafana/provisioning/datasources/default.yaml
      - ./dashboards.yaml:/etc/grafana/provisioning/dashboards/default.yaml
      - ./jmeter.json:/var/lib/grafana/dashboards/jmeter.json
    ports:
      - 3000:3000
    restart: always
    networks:
      - net
    logging:
      driver: json-file
      options:
        max-size: "64m"
        max-file: "5"