spring.application.name=demo-spring-boot-scaffold
server.port=8080

# mybatis-plus\u914D\u7F6E
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/demo_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
# \u4E3A`true`\u65F6\uFF0C`java bean`\u9A7C\u5CF0\u8F6C\u6362\u4E3A\u6570\u636E\u5E93\u5B57\u6BB5\u4E0B\u5212\u7EBF\uFF0C\u5982\uFF1A`clientId`\u8F6C\u6362\u4E3A`client_id`\uFF1B\u4E3A`false`\u65F6\uFF0C\u4E0D\u4F5C\u51FA\u4EFB\u4F55\u8F6C\u6362\u3002
mybatis-plus.configuration.map-underscore-to-camel-case=false
# \u7528\u4E8E\u6307\u5B9Amybatis-plus mapper xml\u6240\u5728\u8DEF\u5F84
mybatis.mapper-locations=classpath:mapper/*.xml,classpath:mapper/**/*.xml
# \u7528\u4E8E\u6307\u5B9Amybatis-plus\u626B\u63CFjava\u679A\u4E3E\u6240\u5728\u7684\u5305\uFF0C
# \u5B9E\u73B0Java\u679A\u4E3E\u7C7B\u578B\u4E0E\u6570\u636E\u5E93\u4E2D\u7684\u6570\u636E\u7C7B\u578B\uFF08\u5982\u5B57\u7B26\u4E32\u3001\u6574\u6570\u7B49\uFF09\u4E4B\u95F4\u7684\u8F6C\u6362
mybatis-plus.type-enums-package=com.future.demo

# redis\u96C6\u7FA4\u914D\u7F6E
# \u914D\u7F6Eredis\u96C6\u7FA4\u8282\u70B9\uFF0C\u53EF\u4EE5\u662F\u5168\u90E8\u6216\u8005\u90E8\u5206\u8282\u70B9\uFF08\u5BA2\u6237\u7AEF\u4F1A\u81EA\u52A8\u53D1\u73B0\u5176\u4ED6\u8282\u70B9\uFF09
spring.redis.cluster.nodes=localhost:6380,localhost:6381,localhost:6382
# \u6307\u5B9A\u4E86 Redis \u5BA2\u6237\u7AEF\u5728\u4E0E Redis \u96C6\u7FA4\u8FDB\u884C\u901A\u4FE1\u65F6\uFF0C\u5141\u8BB8\u6267\u884C\u7684\u91CD\u5B9A\u5411\u64CD\u4F5C\u7684\u6700\u5927\u6B21\u6570\u3002
# \u5F53 Redis \u5BA2\u6237\u7AEF\u5C1D\u8BD5\u5728\u96C6\u7FA4\u4E2D\u6267\u884C\u67D0\u4E2A\u64CD\u4F5C\u65F6\uFF0C\u53EF\u80FD\u4F1A\u56E0\u4E3A\u6570\u636E\u5206\u5E03\u7684\u539F\u56E0\u800C\u9047\u5230\u8282\u70B9\u7684\u91CD\u5B9A\u5411\u64CD\u4F5C\u3002\u4F8B\u5982\uFF0C\u5BA2\u6237\u7AEF\u5C1D\u8BD5\u8BBF\u95EE\u4E00\u4E2A key\uFF0C\u4F46\u8BE5 key \u5E76\u4E0D\u5728\u5F53\u524D\u8282\u70B9\u4E0A\uFF0C\u6B64\u65F6\u8282\u70B9\u4F1A\u544A\u8BC9\u5BA2\u6237\u7AEF\u53BB\u54EA\u4E2A\u8282\u70B9\u4E0A\u67E5\u627E\u8BE5 key\u3002
# \u7528\u6765\u5B9A\u4E49\u8FD9\u79CD\u91CD\u5B9A\u5411\u64CD\u4F5C\u7684\u6700\u5927\u6B21\u6570\u3002\u5982\u679C\u8D85\u8FC7\u4E86\u8FD9\u4E2A\u9650\u5236\u6B21\u6570\uFF0C\u5BA2\u6237\u7AEF\u5C06\u4E0D\u518D\u8FDB\u884C\u91CD\u5B9A\u5411\uFF0C\u5E76\u4E14\u4F1A\u62A5\u9519\u3002
spring.redis.cluster.max-redirects=6
