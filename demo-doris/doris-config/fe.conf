#
# Apache Doris FE config (for Docker Compose demo)
#
# 说明：
# - Doris 4.x 的 FE 进程运行在 JDK 17 上，FE 的 JVM 参数由 `JAVA_OPTS_FOR_JDK_17` 控制。
# - 你要求 FE 内存为 2G，这里将堆大小固定为 `-Xms2g -Xmx2g`。
# - 该文件会被 docker-compose 挂载到容器内的 `.../fe/conf/fe.conf` 覆盖默认配置。
# - 如果后续你想调大/调小，只需要改 `-Xms/-Xmx` 即可。
#

#####################################################################
## The uppercase properties are read and exported by bin/start_fe.sh.
## To see all Frontend configurations,
## see fe/src/org/apache/doris/common/Config.java
#####################################################################

CUR_DATE=`date +%Y%m%d-%H%M%S`

# Log dir
LOG_DIR = ${DORIS_HOME}/log

# For jdk 17, this JAVA_OPTS will be used as default JVM options
#
# 关键改动：
# - 默认模板是 -Xmx8192m -Xms8192m
# - 这里按你的要求改为 1G：-Xmx1g -Xms1g
JAVA_OPTS_FOR_JDK_17="-Dfile.encoding=UTF-8 -Djavax.security.auth.useSubjectCredsOnly=false -Xmx1g -Xms1g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=$LOG_DIR -Xlog:gc*,classhisto*=trace:$LOG_DIR/fe.gc.log.$CUR_DATE:time,uptime:filecount=10,filesize=50M -Darrow.enable_null_check_for_get=false --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED --add-opens=java.management/sun.management=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED --add-opens=java.xml/com.sun.org.apache.xerces.internal.jaxp=ALL-UNNAMED"

# Set your own JAVA_HOME
# JAVA_HOME=/path/to/jdk/

##
## the lowercase properties are read by main program.
##

http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9010
arrow_flight_sql_port = 8070

# Advanced configurations
sys_log_level = INFO
sys_log_mode = ASYNC

priority_networks = 192.168.1.0/24
