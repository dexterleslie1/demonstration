# Apache Doris BE config (for Docker Compose demo)
#
# 说明：
# - 对 BE（C++ 进程）来说，用 `mem_limit` 限制 Doris 侧统计与管控的进程内存上限（非 cgroup 独占）。
# - 若整机只给 Doris 约 4G：不能把 `mem_limit` 再调高；出现 `MEM_LIMIT_EXCEEDED` 时只能：
#   (1) 压低常驻（JVM 堆、PageCache 等）给物化视图/导入腾峰值；(2) 建 MV 前 `curl` 清缓存（见官方「Cache Memory Analysis」）；
#   (3) 简化 MV/基表更小/换异步汇总表 + 调度写入等架构手段。
# - `mem_limit`、下方缓存比例、JAVA `-Xmx` 修改后均需重启 BE 生效。
# - 该文件会被 docker-compose 挂载到容器内的 `.../be/conf/be.conf` 覆盖默认配置。
#

CUR_DATE=`date +%Y%m%d-%H%M%S`

# Log dir
LOG_DIR="${DORIS_HOME}/log/"

# For jdk 17, this JAVA_OPTS will be used as default JVM options
# 说明：BE 主体是 C++，但 JNI/Java 子系统仍占用 JVM 堆；在 mem_limit 仅 4g 时，默认 -Xmx1024m 会挤占约 1/4 配额，
# 物化视图峰值易与 C++ 侧叠加触发 MEM_LIMIT_EXCEEDED。此处将堆上限收紧到 512m 以把更多进程预算留给存储/查询路径。
# 若你启用强依赖 Java 的特性且 jni.log 出现 OOM，可改为 512m 再观察（仍低于默认 1024m）。
JAVA_OPTS_FOR_JDK_17="-Dfile.encoding=UTF-8 -Djol.skipHotspotSAAttach=true -Xmx512m -DlogPath=$LOG_DIR/jni.log -Xlog:gc*:$LOG_DIR/be.gc.log.$CUR_DATE:time,uptime:filecount=10,filesize=50M -Djavax.security.auth.useSubjectCredsOnly=false -Dsun.security.krb5.debug=true -Dsun.java.command=DorisBE -XX:-CriticalJNINatives -XX:+IgnoreUnrecognizedVMOptions -Darrow.enable_null_check_for_get=false --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED --add-opens=java.management/sun.management=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED --add-opens=java.xml/com.sun.org.apache.xerces.internal.jaxp=ALL-UNNAMED"

# Set your own JAVA_HOME
# JAVA_HOME=/path/to/jdk/

# ports for admin, web, heartbeat service
be_port = 9060
webserver_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060
arrow_flight_sql_port = 8050

# 关键配置：BE 进程内存上限。你当前场景整机只分配约 4G 给 Doris 时保持 4g；须配合下方缓存与 JVM 堆收紧，否则建 MV 易顶满。
mem_limit = 4g

# 低内存机器：缩小 DataPageCache 占 mem_limit 的比例（默认约 20%），减轻与物化视图/Compaction 的峰值争抢。
# 副作用：部分读路径缓存命中下降，延迟可能略升；内存充裕时可删此行恢复默认行为。
storage_page_cache_limit = 5%

# Advanced configurations
sys_log_level = INFO

# If you are not running in aws cloud, you can disable EC2 metadata
AWS_EC2_METADATA_DISABLED=true

priority_networks = 192.168.1.0/24
